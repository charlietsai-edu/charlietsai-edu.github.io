<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>河川水質分析儀：佈局修正版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 核心修正：防止網頁被大圖撐開 */
    html, body { 
        height: 100%; 
        overflow: hidden; /* 禁止全網頁捲動，改用內部捲動 */
        background-color: #f1f5f9;
    }

    /* 限制照片顯示視窗的大小 */
    .viewport-container { 
      height: 45vh; /* 佔據螢幕高度的 45% */
      width: 100%;
      overflow: auto; /* 超出時內部捲動 */
      background-color: #1e293b;
      position: relative;
      border: 2px solid #334155;
      border-radius: 8px;
    }

    /* 畫布容器，縮放時以此為基準 */
    #canvasContainer { 
      transform-origin: 0 0;
      transition: transform 0.1s ease;
      display: inline-block;
    }

    /* 確保 Canvas 不會強行撐開父層，而是服從 JS 設定的尺寸 */
    canvas { display: block; }

    /* 控制列與側邊欄 */
    .controls-panel { height: 12vh; overflow: hidden; }
    .sidebar-area { height: 35vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }

    /* 桌機版佈局調整 */
    @media (min-width: 768px) {
        body { overflow: auto; height: auto; }
        .flex-main { flex-direction: row; height: 85vh; }
        .viewport-container { height: 70vh; }
        .sidebar-area { height: 70vh; width: 400px; }
    }

    .std-input {
      font-size: 16px !important;
      border: 1px solid #cbd5e1;
      padding: 6px 10px;
      border-radius: 6px;
      width: 100%;
    }
  </style>
</head>
<body class="p-2">
  <div class="max-w-7xl mx-auto h-full flex flex-col">
    <header class="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm border mb-2">
        <h1 class="font-bold text-indigo-900 text-sm md:text-xl">水質分析儀 (佈局修正)</h1>
        <button id="btnClearAll" class="text-[10px] px-2 py-1 bg-slate-100 rounded">重設</button>
    </header>

    <div class="flex flex-col flex-main gap-2 overflow-hidden">
        <div class="flex-1 flex flex-col bg-white rounded-xl shadow p-2 overflow-hidden">
          <div id="viewport" class="viewport-container">
            <div id="canvasContainer">
              <canvas id="canvas"></canvas>
              <canvas id="overlay" class="absolute left-0 top-0 pointer-events-none"></canvas>
            </div>
          </div>
          
          <div class="controls-panel mt-2 grid grid-cols-2 gap-2 items-center border-t pt-2">
            <div class="flex gap-1 items-center">
              <button id="btnZoomIn" class="bg-slate-700 text-white w-8 h-8 rounded">＋</button>
              <button id="btnZoomOut" class="bg-slate-700 text-white w-8 h-8 rounded">－</button>
              <button id="btnZoomReset" class="text-[10px] px-2 py-1 bg-slate-200 rounded">重置縮放</button>
            </div>
            <div class="flex justify-end gap-1">
              <button id="btnUp" class="bg-slate-500 text-white w-7 h-7 rounded text-xs">↑</button>
              <button id="btnDown" class="bg-slate-500 text-white w-7 h-7 rounded text-xs">↓</button>
              <button id="btnLeft" class="bg-slate-500 text-white w-7 h-7 rounded text-xs">←</button>
              <button id="btnRight" class="bg-slate-500 text-white w-7 h-7 rounded text-xs">→</button>
            </div>
          </div>
        </div>

        <aside class="sidebar-area bg-white rounded-xl shadow p-4 border">
          <div class="space-y-4">
            <div class="bg-indigo-50 p-3 rounded-lg border border-indigo-100">
              <label class="block text-xs font-bold text-indigo-900 mb-1">1. 匯入照片</label>
              <input id="fileInput" type="file" accept="image/*" class="w-full text-xs" />
            </div>

            <div class="flex gap-2">
              <button id="modeStandard" class="flex-1 py-2 border-2 rounded-lg text-xs font-bold">標準色</button>
              <button id="modeSample" class="flex-1 py-2 border-2 rounded-lg text-xs font-bold">水樣色</button>
            </div>

            <div id="standardsList" class="space-y-2">
                <p class="text-[10px] text-slate-400 italic text-center">待框選標準色...</p>
            </div>

            <div id="sampleBox" class="p-2 bg-slate-50 rounded border text-center text-[10px]">尚未選取水樣</div>

            <div class="pt-2 border-t">
              <button id="btnAnalyze" class="w-full py-3 bg-indigo-600 text-white rounded-lg font-bold shadow-md">計算濃度</button>
              <div id="result" class="mt-2 p-3 bg-slate-900 text-green-400 text-center font-mono text-2xl rounded-lg">--</div>
            </div>
            
            <button id="btnCancel" class="w-full py-2 bg-rose-500 text-white rounded text-xs">刪除當前選取</button>
          </div>
        </aside>
    </div>
  </div>

<script>
let state = {
    img: new Image(),
    imgLoaded: false,
    mode: null, 
    regions: [], 
    current: null, 
    selectedId: null,
    viewScale: 1.0
};

const dom = {
    fileInput: document.getElementById('fileInput'),
    canvas: document.getElementById('canvas'),
    overlay: document.getElementById('overlay'),
    ctx: document.getElementById('canvas').getContext('2d', { alpha: false }),
    octx: document.getElementById('overlay').getContext('2d'),
    container: document.getElementById('canvasContainer'),
    viewport: document.getElementById('viewport'),
    standardsList: document.getElementById('standardsList'),
    sampleBox: document.getElementById('sampleBox'),
    result: document.getElementById('result')
};

dom.fileInput.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
        state.img = new Image();
        state.img.onload = function() {
            let tw = state.img.naturalWidth, th = state.img.naturalHeight;
            const MAX = 2000;
            if (tw > MAX || th > MAX) {
                const r = Math.min(MAX/tw, MAX/th);
                tw = Math.floor(tw*r); th = Math.floor(th*r);
            }
            dom.canvas.width = dom.overlay.width = tw;
            dom.canvas.height = dom.overlay.height = th;
            dom.ctx.fillStyle = "#FFFFFF";
            dom.ctx.fillRect(0,0,tw,th);
            dom.ctx.drawImage(state.img, 0, 0, tw, th);
            state.imgLoaded = true;
            state.regions = [];
            resetView();
            refreshUI();
            renderOverlay();
        };
        state.img.src = event.target.result;
    };
    reader.readAsDataURL(file);
};

// --- 視角與縮放 ---
function applyView() { dom.container.style.transform = `scale(${state.viewScale})`; }
function resetView() { state.viewScale = 1.0; applyView(); dom.viewport.scrollTop = 0; dom.viewport.scrollLeft = 0; }
document.getElementById('btnZoomIn').onclick = () => { state.viewScale += 0.2; applyView(); };
document.getElementById('btnZoomOut').onclick = () => { if(state.viewScale > 0.4) { state.viewScale -= 0.2; applyView(); } };
document.getElementById('btnZoomReset').onclick = resetView;
const moveS = 80;
document.getElementById('btnUp').onclick = () => dom.viewport.scrollTop -= moveS;
document.getElementById('btnDown').onclick = () => dom.viewport.scrollTop += moveS;
document.getElementById('btnLeft').onclick = () => dom.viewport.scrollLeft -= moveS;
document.getElementById('btnRight').onclick = () => dom.viewport.scrollLeft += moveS;

// --- 座標計算 ---
function getPos(e) {
    const rect = dom.canvas.getBoundingClientRect();
    const cx = (e.touches && e.touches.length) ? e.touches[0].clientX : e.clientX;
    const cy = (e.touches && e.touches.length) ? e.touches[0].clientY : e.clientY;
    return {
        x: (cx - rect.left) * (dom.canvas.width / rect.width),
        y: (cy - rect.top) * (dom.canvas.height / rect.height)
    };
}

function handleStart(e) {
    if (e.target.tagName === 'INPUT') return;
    if (!state.imgLoaded) return;
    const pos = getPos(e);
    const hit = state.regions.find(r => pos.x >= r.x && pos.x <= r.x+r.w && pos.y >= r.y && pos.y <= r.y+r.h);
    if (hit) { state.selectedId = hit.id; refreshUI(); renderOverlay(); return; }
    if (!state.mode) return;
    state.current = { x0: pos.x, y0: pos.y, x: pos.x, y: pos.y };
}

function handleMove(e) {
    if (!state.current) return;
    if (e.cancelable) e.preventDefault();
    const pos = getPos(e);
    state.current.x = pos.x; state.current.y = pos.y;
    renderOverlay();
}

function handleEnd() {
    if (!state.current) return;
    const { x0, y0, x, y } = state.current;
    const r = { id: Date.now(), x: Math.min(x0,x), y: Math.min(y0,y), w: Math.max(5, Math.abs(x-x0)), h: Math.max(5, Math.abs(y-y0)), type: state.mode, conc: null };
    if (r.w > 5) {
        if (r.type === 'sample') state.regions = state.regions.filter(i => i.type !== 'sample');
        r.avg = getAvgColor(r);
        state.regions.push(r);
        state.selectedId = r.id;
    }
    state.current = null; refreshUI(); renderOverlay();
}

dom.container.addEventListener('touchstart', (e) => { handleStart(e); if(state.mode) e.preventDefault(); }, {passive: false});
window.addEventListener('touchmove', (e) => { if(state.current) handleMove(e); }, {passive: false});
window.addEventListener('touchend', handleEnd);
dom.container.addEventListener('mousedown', handleStart);
window.addEventListener('mousemove', (e) => { if(state.current) handleMove(e); });
window.addEventListener('mouseup', handleEnd);

function getAvgColor(r) {
    const d = dom.ctx.getImageData(r.x, r.y, r.w, r.h).data;
    let rs=0, gs=0, bs=0, c=0;
    for (let i=0; i<d.length; i+=4) { rs+=d[i]; gs+=d[i+1]; bs+=d[i+2]; c++; }
    return { r: rs/c, g: gs/c, b: bs/c };
}

function rgbToLab(r,g,b){
    let [R,G,B] = [r/255,g/255,b/255].map(v => v > 0.04045 ? Math.pow((v+0.055)/1.055, 2.4) : v/12.92);
    let X = R*0.4124 + G*0.3576 + B*0.1804, Y = R*0.2126 + G*0.7152 + B*0.0722, Z = R*0.0193 + G*0.1192 + B*0.9505;
    [X,Y,Z] = [X/0.95047, Y/1.0, Z/1.08883].map(v => v > 0.008856 ? Math.cbrt(v) : (7.787*v + 16/116));
    return { L: (116*Y)-16, a: 500*(X-Y), b: 200*(Y-Z) };
}

function renderOverlay() {
    dom.octx.clearRect(0,0,dom.overlay.width,dom.overlay.height);
    state.regions.forEach(r => {
        dom.octx.lineWidth = (r.id === state.selectedId) ? 10 : 5;
        dom.octx.strokeStyle = r.type === 'standard' ? '#4f46e5' : '#10b981';
        dom.octx.strokeRect(r.x, r.y, r.w, r.h);
    });
    if (state.current) {
        dom.octx.setLineDash([10, 8]); dom.octx.strokeStyle = '#f59e0b';
        dom.octx.strokeRect(state.current.x0, state.current.y0, state.current.x-state.current.x0, state.current.y-state.current.y0);
        dom.octx.setLineDash([]);
    }
}

function refreshUI() {
    const stds = state.regions.filter(r => r.type === 'standard');
    dom.standardsList.innerHTML = stds.length ? '' : '<p class="text-[10px] text-slate-400 italic text-center">待框選...</p>';
    stds.forEach(r => {
        const item = document.createElement('div');
        item.className = `flex items-center gap-2 p-2 rounded border ${r.id === state.selectedId ? 'border-indigo-500 bg-indigo-50' : 'border-slate-100 bg-white'}`;
        item.innerHTML = `<div class="w-6 h-6 rounded border" style="background:rgb(${r.avg.r},${r.avg.g},${r.avg.b})"></div>
            <input type="number" step="any" inputmode="decimal" class="std-input" placeholder="值" value="${r.conc !== null ? r.conc : ''}">
            <button class="text-rose-500 text-xs px-1">✕</button>`;
        const input = item.querySelector('input');
        input.addEventListener('touchstart', (e)=>e.stopPropagation());
        input.oninput = (e) => { r.conc = e.target.value === '' ? null : parseFloat(e.target.value); };
        item.querySelector('button').onclick = (e) => { e.stopPropagation(); state.regions = state.regions.filter(rg => rg.id !== r.id); refreshUI(); renderOverlay(); };
        item.onclick = () => { state.selectedId = r.id; renderOverlay(); refreshUI(); };
        dom.standardsList.appendChild(item);
    });
    const samp = state.regions.find(r => r.type === 'sample');
    dom.sampleBox.innerHTML = samp ? `<div class="flex items-center gap-2 justify-center"><div class="w-5 h-5 rounded" style="background:rgb(${samp.avg.r},${samp.avg.g},${samp.avg.b})"></div><b class="text-emerald-600 text-[10px]">水樣 OK</b></div>` : '尚未選取水樣';
}

document.getElementById('modeStandard').onclick = () => { state.mode='standard'; document.getElementById('modeStandard').className='flex-1 py-2 bg-indigo-600 text-white rounded-lg text-xs font-bold'; document.getElementById('modeSample').className='flex-1 py-2 border-2 text-slate-400 rounded-lg text-xs'; };
document.getElementById('modeSample').onclick = () => { state.mode='sample'; document.getElementById('modeSample').className='flex-1 py-2 bg-emerald-600 text-white rounded-lg text-xs font-bold'; document.getElementById('modeStandard').className='flex-1 py-2 border-2 text-slate-400 rounded-lg text-xs'; };
document.getElementById('btnCancel').onclick = () => { if(state.selectedId){ state.regions = state.regions.filter(r => r.id !== state.selectedId); state.selectedId = null; refreshUI(); renderOverlay(); } };
document.getElementById('btnAnalyze').onclick = () => {
    const stds = state.regions.filter(r => r.type === 'standard' && r.conc !== null).sort((a,b) => a.conc - b.conc);
    const samp = state.regions.find(r => r.type === 'sample');
    if (stds.length < 2 || !samp) return alert('需 2 個標準值 + 1 個水樣');
    const sL = rgbToLab(samp.avg.r, samp.avg.g, samp.avg.b), sLs = stds.map(s => ({ c: s.conc, l: rgbToLab(s.avg.r, s.avg.g, s.avg.b) }));
    let res = -1;
    for (let i=0; i<sLs.length-1; i++) {
        const s1=sLs[i], s2=sLs[i+1], d1=Math.sqrt(Math.pow(sL.L-s1.l.L,2)+Math.pow(sL.a-s1.l.a,2)+Math.pow(sL.b-s1.l.b,2)), d2=Math.sqrt(Math.pow(sL.L-s2.l.L,2)+Math.pow(sL.a-s2.l.a,2)+Math.pow(sL.b-s2.l.b,2)), d12=Math.sqrt(Math.pow(s1.l.L-s2.l.L,2)+Math.pow(s1.l.a-s2.l.a,2)+Math.pow(s1.l.b-s2.l.b,2));
        if (d1+d2 <= d12*1.2) { res = s1.c + (d1/(d1+d2))*(s2.c-s1.c); break; }
    }
    if (res===-1) res = sLs.map(s => ({c:s.c, d:Math.sqrt(Math.pow(sL.L-s.l.L,2)+Math.pow(sL.a-s.l.a,2)+Math.pow(sL.b-s.l.b,2))})).sort((a,b)=>a.d-b.d)[0].c;
    dom.result.innerText = res.toFixed(3);
};
document.getElementById('btnClearAll').onclick = () => { if(confirm('重設？')){ state.regions=[]; state.selectedId=null; refreshUI(); renderOverlay(); dom.result.innerText='--'; resetView(); } };
</script>
</body>
</html>
