<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>水質分析儀：介面終極版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 全域鎖定，防止 iPad 橡皮筋捲動干擾 */
    body { background-color: #f1f5f9; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
    
    /* 照片視窗：佔據上半部或左半部 */
    .viewport-box { 
      flex: 1; 
      width: 100%; 
      background-color: #0f172a; 
      position: relative; 
      overflow: hidden; 
      touch-action: none; 
    }

    #canvasContainer { 
      position: absolute; 
      left: 0; top: 0; 
      transform-origin: 0 0; 
      cursor: grab; 
      visibility: hidden; 
    }

    canvas { display: block; }

    /* 控制面板：佔據下半部或右半部 */
    .control-sidebar { 
      height: 48vh; 
      background: white; 
      border-top: 2px solid #e2e8f0; 
      overflow-y: auto; 
      padding: 16px; 
      z-index: 50;
    }

    /* 桌機與 iPad 橫向佈局 */
    @media (min-width: 768px) { 
      body { flex-direction: row; } 
      .viewport-box { height: 100vh; } 
      .control-sidebar { width: 400px; height: 100vh; border-top: 0; border-left: 2px solid #e2e8f0; } 
    }

    .std-input { 
      font-size: 16px !important; 
      border: 2px solid #cbd5e1; 
      padding: 10px; 
      border-radius: 8px; 
      width: 100%; 
    }
  </style>
</head>
<body>

  <main id="viewport" class="viewport-box">
    <div id="canvasContainer">
      <canvas id="canvas"></canvas>
      <canvas id="overlay" class="absolute left-0 top-0 pointer-events-none"></canvas>
    </div>
    <div id="loading" class="absolute inset-0 flex items-center justify-center text-white bg-slate-900/80 hidden">照片處理中...</div>
  </main>

  <aside class="control-sidebar">
    <div class="space-y-6">
      
      <div class="flex justify-between items-center border-b pb-2">
        <h2 class="font-bold text-indigo-900">水質比色數據分析</h2>
        <button id="btnClearAll" class="text-[10px] text-red-500 font-bold border border-red-100 px-2 py-1 rounded">重置所有</button>
      </div>

      <div class="bg-indigo-50 p-3 rounded-xl border border-indigo-200">
        <label class="block text-xs font-bold text-indigo-900 mb-2 tracking-tighter">1. 選取或拍攝水樣照片</label>
        <input id="fileInput" type="file" accept="image/*" class="w-full text-xs" />
      </div>

      <div class="flex gap-2">
        <button id="modeStandard" class="flex-1 py-3 border-2 rounded-xl text-xs font-bold bg-white transition-all border-slate-200 shadow-sm">標標準色</button>
        <button id="modeSample" class="flex-1 py-3 border-2 rounded-xl text-xs font-bold bg-white transition-all border-slate-200 shadow-sm">標水樣色</button>
      </div>

      <div id="standardsList" class="space-y-2 min-h-[40px]">
        <p class="text-[10px] text-slate-400 text-center py-2 italic">尚未選取檔案</p>
      </div>
      <div id="sampleBox" class="p-2 bg-slate-50 rounded-lg text-center text-[10px] text-slate-400">尚未標記水樣</div>

      <div class="space-y-3 pt-2">
        <button id="btnAnalyze" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg active:scale-95 transition-transform">執行分析計算</button>
        <div id="result" class="p-4 bg-slate-900 text-green-400 text-center font-mono text-4xl rounded-xl border-4 border-slate-700 shadow-inner">--</div>
      </div>

      <div class="pt-4 border-t-2 border-dashed border-slate-100">
        <h3 class="text-xs font-bold text-slate-500 mb-3 uppercase tracking-widest text-center">視角操作控制 (放大/移動)</h3>
        <div class="flex items-center gap-2 mb-3">
          <button id="btnZoomIn" class="flex-1 py-4 bg-slate-100 text-slate-800 rounded-2xl font-bold shadow-sm border border-slate-200 active:bg-slate-200">＋ 放大</button>
          <button id="btnZoomOut" class="flex-1 py-4 bg-slate-100 text-slate-800 rounded-2xl font-bold shadow-sm border border-slate-200 active:bg-slate-200">－ 縮小</button>
          <button id="btnZoomReset" class="px-5 py-4 bg-slate-800 text-white rounded-2xl text-xs font-bold shadow-md active:scale-95">重置視角</button>
        </div>
        <button id="btnCancel" class="w-full py-2 bg-rose-50 text-rose-500 text-[11px] font-bold rounded-xl border border-rose-100">刪除所選色塊區域</button>
      </div>

    </div>
  </aside>

<script>
let state = {
    img: new Image(), imgLoaded: false, mode: null, 
    regions: [], current: null, selectedId: null,
    viewScale: 1.0, posX: 0, posY: 0, isDragging: false, dragStart: { x: 0, y: 0 }
};

const dom = {
    fileInput: document.getElementById('fileInput'),
    canvas: document.getElementById('canvas'),
    overlay: document.getElementById('overlay'),
    ctx: document.getElementById('canvas').getContext('2d', { willReadFrequently: true }),
    octx: document.getElementById('overlay').getContext('2d'),
    container: document.getElementById('canvasContainer'),
    viewport: document.getElementById('viewport'),
    standardsList: document.getElementById('standardsList'),
    sampleBox: document.getElementById('sampleBox'),
    result: document.getElementById('result'),
    loading: document.getElementById('loading')
};

// 圖片上傳
dom.fileInput.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    dom.loading.classList.remove('hidden');
    state.imgLoaded = false;
    dom.container.style.visibility = 'hidden';

    const reader = new FileReader();
    reader.onload = (event) => {
        const temp = new Image();
        temp.onload = () => {
            let tw = temp.width, th = temp.height;
            const MAX = 2200;
            if (tw > MAX || th > MAX) {
                const r = Math.min(MAX/tw, MAX/th);
                tw = Math.floor(tw*r); th = Math.floor(th*r);
            }
            dom.canvas.width = tw; dom.canvas.height = th;
            dom.overlay.width = tw; dom.overlay.height = th;
            setTimeout(() => {
                dom.ctx.fillStyle = "#FFFFFF";
                dom.ctx.fillRect(0,0,tw,th);
                dom.ctx.drawImage(temp, 0, 0, tw, th);
                state.img = temp; state.imgLoaded = true; state.regions = [];
                dom.container.style.visibility = 'visible';
                dom.loading.classList.add('hidden');
                resetView(); refreshUI(); renderOverlay();
            }, 150);
        };
        temp.src = event.target.result;
    };
    reader.readAsDataURL(file);
};

// 視角與位移
function updateTransform() { 
    dom.container.style.transform = `translate(${state.posX}px, ${state.posY}px) scale(${state.viewScale})`; 
}
function resetView() { 
    state.viewScale = 1.0; state.posX = 0; state.posY = 0; updateTransform(); 
}
document.getElementById('btnZoomIn').onclick = () => { state.viewScale *= 1.4; updateTransform(); };
document.getElementById('btnZoomOut').onclick = () => { state.viewScale /= 1.4; updateTransform(); };
document.getElementById('btnZoomReset').onclick = resetView;

// 核心座標捕捉
function getCanvasPos(e) {
    const rect = dom.viewport.getBoundingClientRect();
    const cx = (e.touches && e.touches.length) ? e.touches[0].clientX : e.clientX;
    const cy = (e.touches && e.touches.length) ? e.touches[0].clientY : e.clientY;
    return {
        x: (cx - rect.left - state.posX) / state.viewScale,
        y: (cy - rect.top - state.posY) / state.viewScale
    };
}

function handleStart(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON' || !state.imgLoaded) return;
    const pos = getCanvasPos(e);
    const hit = state.regions.find(r => pos.x >= r.x && pos.x <= r.x+r.w && pos.y >= r.y && pos.y <= r.y+r.h);
    if (hit) { state.selectedId = hit.id; refreshUI(); renderOverlay(); return; }
    
    if (state.mode) { 
        state.current = { x0: pos.x, y0: pos.y, x: pos.x, y: pos.y }; 
    } else {
        state.isDragging = true;
        const cx = (e.touches && e.touches.length) ? e.touches[0].clientX : e.clientX;
        const cy = (e.touches && e.touches.length) ? e.touches[0].clientY : e.clientY;
        state.dragStart = { x: cx - state.posX, y: cy - state.posY };
    }
}

function handleMove(e) {
    if (!state.current && !state.isDragging) return;
    if (e.cancelable) e.preventDefault();
    const cx = (e.touches && e.touches.length) ? e.touches[0].clientX : e.clientX;
    const cy = (e.touches && e.touches.length) ? e.touches[0].clientY : e.clientY;
    if (state.current) { const pos = getCanvasPos(e); state.current.x = pos.x; state.current.y = pos.y; renderOverlay(); } 
    else if (state.isDragging) { state.posX = cx - state.dragStart.x; state.posY = cy - state.dragStart.y; updateTransform(); }
}

function handleEnd() {
    if (state.current) {
        const { x0, y0, x, y } = state.current;
        const r = { id: Date.now(), x: Math.min(x0,x), y: Math.min(y0,y), w: Math.abs(x-x0), h: Math.abs(y-y0), type: state.mode, conc: null };
        if (r.w > 5) {
            if (r.type === 'sample') state.regions = state.regions.filter(i => i.type !== 'sample');
            r.avg = getAvgColor(r); state.regions.push(r); state.selectedId = r.id;
        }
    }
    state.current = null; state.isDragging = false; refreshUI(); renderOverlay();
}

dom.viewport.addEventListener('touchstart', handleStart, {passive: false});
dom.viewport.addEventListener('touchmove', handleMove, {passive: false});
dom.viewport.addEventListener('touchend', handleEnd);
dom.viewport.addEventListener('mousedown', handleStart);
window.addEventListener('mousemove', handleMove);
window.addEventListener('mouseup', handleEnd);

function getAvgColor(r) {
    const d = dom.ctx.getImageData(r.x, r.y, r.w, r.h).data;
    let rs=0, gs=0, bs=0, c=0;
    for (let i=0; i<d.length; i+=4) { rs+=d[i]; gs+=d[i+1]; bs+=d[i+2]; c++; }
    return { r: rs/c, g: gs/c, b: bs/c };
}

function rgbToLab(r,g,b){
    let [R,G,B] = [r/255,g/255,b/255].map(v => v > 0.04045 ? Math.pow((v+0.055)/1.055, 2.4) : v/12.92);
    let X = R*0.4124 + G*0.3576 + B*0.1804, Y = R*0.2126 + G*0.7152 + B*0.0722, Z = R*0.0193 + G*0.1192 + B*0.9505;
    [X,Y,Z] = [X/0.95047, Y/1.0, Z/1.08883].map(v => v > 0.008856 ? Math.cbrt(v) : (7.787*v + 16/116));
    return { L: (116*Y)-16, a: 500*(X-Y), b: 200*(Y-Z) };
}

function renderOverlay() {
    dom.octx.clearRect(0,0,dom.overlay.width,dom.overlay.height);
    state.regions.forEach(r => {
        dom.octx.lineWidth = (r.id === state.selectedId) ? 10 : 5;
        dom.octx.strokeStyle = r.type === 'standard' ? '#6366f1' : '#10b981';
        dom.octx.strokeRect(r.x, r.y, r.w, r.h);
    });
    if (state.current) {
        dom.octx.setLineDash([10, 8]); dom.octx.strokeStyle = '#f59e0b';
        dom.octx.strokeRect(state.current.x0, state.current.y0, state.current.x-state.current.x0, state.current.y-state.current.y0);
        dom.octx.setLineDash([]);
    }
}

function refreshUI() {
    const stds = state.regions.filter(r => r.type === 'standard');
    dom.standardsList.innerHTML = stds.length ? '' : '<p class="text-[10px] text-slate-300 text-center py-2 italic">標記標準色塊後於此輸入濃度值</p>';
    stds.forEach(r => {
        const item = document.createElement('div');
        item.className = `flex items-center gap-2 p-2 rounded-xl border ${r.id === state.selectedId ? 'border-indigo-500 bg-indigo-50 shadow-sm' : 'border-slate-100 bg-white'}`;
        item.innerHTML = `<div class="w-8 h-8 rounded-lg border shadow-inner" style="background:rgb(${r.avg.r},${r.avg.g},${r.avg.b})"></div>
            <div class="flex-1"><input type="number" inputmode="decimal" class="std-input" placeholder="濃度值" value="${r.conc !== null ? r.conc : ''}"></div>
            <button class="text-rose-400 font-bold px-1 text-sm">✕</button>`;
        const input = item.querySelector('input');
        input.ontouchstart = (e) => e.stopPropagation();
        input.oninput = (e) => { r.conc = e.target.value === '' ? null : parseFloat(e.target.value); };
        item.querySelector('button').onclick = (e) => { e.stopPropagation(); state.regions = state.regions.filter(rg => rg.id !== r.id); refreshUI(); renderOverlay(); };
        item.onclick = () => { state.selectedId = r.id; renderOverlay(); refreshUI(); };
        dom.standardsList.appendChild(item);
    });
    const samp = state.regions.find(r => r.type === 'sample');
    dom.sampleBox.innerHTML = samp ? `<div class="flex items-center gap-2 justify-center"><div class="w-5 h-5 rounded border" style="background:rgb(${samp.avg.r},${samp.avg.g},${samp.avg.b})"></div><b class="text-emerald-600 text-xs">水樣色塊標註 OK</b></div>` : '尚未選取水樣色塊';
}

document.getElementById('modeStandard').onclick = () => { state.mode = (state.mode === 'standard') ? null : 'standard'; updateModeUI(); };
document.getElementById('modeSample').onclick = () => { state.mode = (state.mode === 'sample') ? null : 'sample'; updateModeUI(); };
function updateModeUI() {
    document.getElementById('modeStandard').className = `flex-1 py-3 border-2 rounded-xl text-xs font-bold transition-all ${state.mode === 'standard' ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-white border-slate-200 text-slate-600'}`;
    document.getElementById('modeSample').className = `flex-1 py-3 border-2 rounded-xl text-xs font-bold transition-all ${state.mode === 'sample' ? 'bg-emerald-600 border-emerald-600 text-white shadow-md' : 'bg-white border-slate-200 text-slate-600'}`;
}

document.getElementById('btnAnalyze').onclick = () => {
    const stds = state.regions.filter(r => r.type === 'standard' && r.conc !== null).sort((a,b) => a.conc - b.conc);
    const samp = state.regions.find(r => r.type === 'sample');
    if (stds.length < 2 || !samp) return alert('分析前請先標記 2 個標準值與 1 個水樣區');
    const sL = rgbToLab(samp.avg.r, samp.avg.g, samp.avg.b), sLs = stds.map(s => ({ c: s.conc, l: rgbToLab(s.avg.r, s.avg.g, s.avg.b) }));
    let res = -1;
    for (let i=0; i<sLs.length-1; i++) {
        const s1=sLs[i], s2=sLs[i+1], d1=Math.sqrt(Math.pow(sL.L-s1.l.L,2)+Math.pow(sL.a-s1.l.a,2)+Math.pow(sL.b-s1.l.b,2)), d2=Math.sqrt(Math.pow(sL.L-s2.l.L,2)+Math.pow(sL.a-s2.l.a,2)+Math.pow(sL.b-s2.l.b,2)), d12=Math.sqrt(Math.pow(s1.l.L-s2.l.L,2)+Math.pow(s1.l.a-s2.l.a,2)+Math.pow(s1.l.b-s2.l.b,2));
        if (d1+d2 <= d12*1.2) { res = s1.c + (d1/(d1+d2))*(s2.c-s1.c); break; }
    }
    if (res===-1) res = sLs.map(s => ({c:s.c, d:Math.sqrt(Math.pow(sL.L-s.l.L,2)+Math.pow(sL.a-s.l.a,2)+Math.pow(sL.b-s.l.b,2))})).sort((a,b)=>a.d-b.d)[0].c;
    dom.result.innerText = res.toFixed(3);
};
document.getElementById('btnCancel').onclick = () => { if(state.selectedId){ state.regions = state.regions.filter(r => r.id !== state.selectedId); state.selectedId = null; refreshUI(); renderOverlay(); } };
document.getElementById('btnClearAll').onclick = () => { if(confirm('確定要清除所有記錄並重新開始？')){ state.regions=[]; state.selectedId=null; refreshUI(); renderOverlay(); dom.result.innerText='--'; resetView(); } };
</script>
</body>
</html>
