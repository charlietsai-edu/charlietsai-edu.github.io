<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>河川水質分析儀：iPad 輸入強化版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { touch-action: auto; overflow-x: hidden; background-color: #f1f5f9; }
    /* 畫布區塊 */
    .canvas-wrap { 
      min-height: 300px;
      max-height: 60vh; 
      overflow: hidden; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      background-color: #1e293b;
      touch-action: none; 
      position: relative;
    }
    canvas { 
      max-width: 100% !important; 
      max-height: 100% !important; 
      display: block; 
    }
    /* 側邊欄捲動 */
    .sidebar { width: 100%; height: 40vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    @media (min-width: 768px) { 
      .sidebar { width: 400px; height: auto; } 
      .canvas-wrap { max-height: 75vh; }
    }
    /* 確保輸入框在 iPad 上清晰可見且易於點擊 */
    input[type="number"] {
      font-size: 16px !important; /* 防止 iOS 自動放大頁面 */
      border: 2px solid #cbd5e1;
      border-radius: 8px;
      padding: 8px;
      width: 100%;
    }
    input[type="number"]:focus {
      border-color: #4f46e5;
      outline: none;
      background-color: #fff;
    }
  </style>
</head>
<body class="min-h-screen">
  <div class="max-w-7xl mx-auto p-2">
    <header class="flex justify-between items-center p-3 mb-2 bg-white rounded-xl shadow-sm border border-slate-200">
        <h1 class="font-bold text-indigo-900 text-lg">水質比色分析 (iPad 修正版)</h1>
        <button id="btnClearAll" class="text-xs px-3 py-1 bg-slate-100 text-slate-600 rounded-lg border">清除數據</button>
    </header>

    <div class="flex flex-col md:flex-row bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
        <div class="flex-1 p-2 bg-slate-800">
          <div class="canvas-wrap rounded-xl mb-2">
            <div id="canvasContainer" class="relative">
              <canvas id="canvas"></canvas>
              <canvas id="overlay" class="absolute left-0 top-0 pointer-events-none"></canvas>
            </div>
          </div>
          <div class="flex gap-2">
            <button id="btnCancel" class="flex-1 py-3 bg-rose-500 text-white rounded-xl font-bold text-sm shadow-lg">刪除目前選取</button>
            <button id="btnZoom" class="flex-1 py-3 bg-slate-600 text-white rounded-xl font-bold text-sm shadow-lg">手動重新對齊</button>
          </div>
        </div>

        <aside class="sidebar p-5">
          <div class="space-y-5">
            <div class="p-4 bg-indigo-50 rounded-xl border border-indigo-100">
              <label class="block text-xs font-bold text-indigo-900 mb-2 uppercase tracking-widest">STEP 1. 匯入照片</label>
              <input id="fileInput" type="file" accept="image/*" class="w-full text-xs file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-600 file:text-white" />
            </div>

            <div class="flex gap-2">
              <button id="modeStandard" class="flex-1 py-3 border-2 rounded-xl text-sm font-bold transition-all">標準色模式</button>
              <button id="modeSample" class="flex-1 py-3 border-2 rounded-xl text-sm font-bold transition-all">受測水樣模式</button>
            </div>

            <div>
              <label class="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-widest">標準色清單 (手動輸入數值)</label>
              <div id="standardsList" class="space-y-3">
                <p class="text-xs text-slate-400 italic text-center py-4 border-2 border-dashed rounded-xl">請開始在照片上框選色塊...</p>
              </div>
            </div>

            <div id="sampleBox" class="p-4 bg-slate-50 border border-slate-200 rounded-xl text-xs font-medium text-slate-400">尚未選取水樣</div>

            <button id="btnAnalyze" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-xl active:scale-95 transition-all">執行濃度分析</button>
            <div id="result" class="p-4 bg-slate-900 text-green-400 text-center font-mono text-3xl rounded-xl shadow-inner border-2 border-slate-700">--</div>
          </div>
        </aside>
    </div>
  </div>

<script>
let state = {
    img: new Image(),
    imgLoaded: false,
    mode: null, 
    regions: [], 
    current: null, 
    selectedId: null,
    scale: { x: 1, y: 1 }
};

const dom = {
    fileInput: document.getElementById('fileInput'),
    canvas: document.getElementById('canvas'),
    overlay: document.getElementById('overlay'),
    ctx: document.getElementById('canvas').getContext('2d', { alpha: false }),
    octx: document.getElementById('overlay').getContext('2d'),
    standardsList: document.getElementById('standardsList'),
    sampleBox: document.getElementById('sampleBox'),
    result: document.getElementById('result')
};

// --- 圖片處理 ---
dom.fileInput.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
        state.img = new Image();
        state.img.onload = function() {
            let tw = state.img.naturalWidth;
            let th = state.img.naturalHeight;
            const MAX = 2000;
            if (tw > MAX || th > MAX) {
                const r = Math.min(MAX/tw, MAX/th);
                tw = Math.floor(tw*r); th = Math.floor(th*r);
            }
            dom.canvas.width = dom.overlay.width = tw;
            dom.canvas.height = dom.overlay.height = th;

            requestAnimationFrame(() => {
                dom.ctx.fillStyle = "#FFFFFF";
                dom.ctx.fillRect(0, 0, tw, th);
                dom.ctx.drawImage(state.img, 0, 0, tw, th);
                state.imgLoaded = true;
                state.regions = [];
                state.selectedId = null;
                setTimeout(() => { updateScale(); refreshUI(); renderOverlay(); }, 300);
            });
        };
        state.img.src = event.target.result;
    };
    reader.readAsDataURL(file);
};

function updateScale() {
    if(!state.imgLoaded) return;
    const rect = dom.canvas.getBoundingClientRect();
    state.scale.x = dom.canvas.width / rect.width;
    state.scale.y = dom.canvas.height / rect.height;
}

document.getElementById('btnZoom').onclick = () => { updateScale(); renderOverlay(); };

// --- 互動與觸控 (重點優化) ---
function getPos(e) {
    const rect = dom.canvas.getBoundingClientRect();
    const clientX = (e.touches && e.touches.length) ? e.touches[0].clientX : e.clientX;
    const clientY = (e.touches && e.touches.length) ? e.touches[0].clientY : e.clientY;
    return {
        x: (clientX - rect.left) * state.scale.x,
        y: (clientY - rect.top) * state.scale.y
    };
}

function handleStart(e) {
    // 如果點擊的是 input 元素，不進行畫布動作
    if (e.target.tagName === 'INPUT') return;

    if (!state.imgLoaded) return;
    updateScale();
    const pos = getPos(e);
    
    // 檢查是否點擊到現有區域
    const hit = state.regions.find(r => pos.x >= r.x && pos.x <= r.x+r.w && pos.y >= r.y && pos.y <= r.y+r.h);
    if (hit) {
        state.selectedId = hit.id;
        refreshUI(); renderOverlay();
        return;
    }
    
    if (!state.mode) return;
    state.current = { x0: pos.x, y0: pos.y, x: pos.x, y: pos.y };
}

function handleMove(e) {
    if (!state.current) return;
    if (e.cancelable) e.preventDefault(); // 禁止頁面捲動
    const pos = getPos(e);
    state.current.x = pos.x;
    state.current.y = pos.y;
    renderOverlay();
}

function handleEnd() {
    if (!state.current) return;
    const { x0, y0, x, y } = state.current;
    const r = { id: Date.now(), x: Math.min(x0,x), y: Math.min(y0,y), w: Math.abs(x-x0), h: Math.abs(y-y0), type: state.mode, conc: null };
    if (r.w > 10 && r.h > 10) {
        if (r.type === 'sample') state.regions = state.regions.filter(i => i.type !== 'sample');
        r.avg = getAvgColor(r);
        state.regions.push(r);
        state.selectedId = r.id;
    }
    state.current = null;
    refreshUI(); renderOverlay();
}

// 監聽畫布點擊
dom.canvas.addEventListener('touchstart', (e) => { handleStart(e); if(state.mode) e.preventDefault(); }, {passive: false});
window.addEventListener('touchmove', handleMove, {passive: false});
window.addEventListener('touchend', handleEnd);
dom.canvas.addEventListener('mousedown', handleStart);
window.addEventListener('mousemove', handleMove);
window.addEventListener('mouseup', handleEnd);

// --- 色彩科學 ---
function getAvgColor(r) {
    const d = dom.ctx.getImageData(r.x, r.y, r.w, r.h).data;
    let rs=0, gs=0, bs=0, c=0;
    for (let i=0; i<d.length; i+=4) { rs+=d[i]; gs+=d[i+1]; bs+=d[i+2]; c++; }
    return { r: rs/c, g: gs/c, b: bs/c };
}

function rgbToLab(r,g,b){
    let [R,G,B] = [r/255,g/255,b/255].map(v => v > 0.04045 ? Math.pow((v+0.055)/1.055, 2.4) : v/12.92);
    let X = R*0.4124 + G*0.3576 + B*0.1804, Y = R*0.2126 + G*0.7152 + B*0.0722, Z = R*0.0193 + G*0.1192 + B*0.9505;
    [X,Y,Z] = [X/0.95047, Y/1.0, Z/1.08883].map(v => v > 0.008856 ? Math.cbrt(v) : (7.787*v + 16/116));
    return { L: (116*Y)-16, a: 500*(X-Y), b: 200*(Y-Z) };
}

function renderOverlay() {
    dom.octx.clearRect(0,0,dom.overlay.width,dom.overlay.height);
    state.regions.forEach(r => {
        dom.octx.lineWidth = (r.id === state.selectedId) ? 12 : 6;
        dom.octx.strokeStyle = r.type === 'standard' ? '#4f46e5' : '#10b981';
        dom.octx.strokeRect(r.x, r.y, r.w, r.h);
    });
    if (state.current) {
        dom.octx.setLineDash([15, 10]); dom.octx.strokeStyle = '#f59e0b';
        dom.octx.strokeRect(state.current.x0, state.current.y0, state.current.x-state.current.x0, state.current.y-state.current.y0);
        dom.octx.setLineDash([]);
    }
}

// --- UI 更新 (重點修正輸入框) ---
function refreshUI() {
    const stds = state.regions.filter(r => r.type === 'standard');
    dom.standardsList.innerHTML = stds.length ? '' : '<p class="text-xs text-slate-400 italic text-center py-4 border-2 border-dashed rounded-xl">請開始在照片上框選色塊...</p>';
    
    stds.forEach(r => {
        const item = document.createElement('div');
        item.className = `flex items-center gap-3 p-3 rounded-xl border-2 transition-all ${r.id === state.selectedId ? 'border-indigo-500 bg-indigo-50 shadow-md scale-[1.02]' : 'border-slate-100 bg-white'}`;
        
        // 核心修正：輸入框設定為 number 且 inputmode 為 decimal
        item.innerHTML = `
            <div class="w-10 h-10 rounded-lg shadow-inner border border-slate-200" style="background:rgb(${r.avg.r},${r.avg.g},${r.avg.b})"></div>
            <div class="flex-1">
              <input type="number" step="any" inputmode="decimal" class="block w-full font-bold text-lg" placeholder="輸入濃度" value="${r.conc !== null ? r.conc : ''}">
            </div>
            <button class="w-10 h-10 bg-rose-50 text-rose-500 rounded-lg font-bold">✕</button>
        `;

        const input = item.querySelector('input');
        
        // iPad 修正：阻止觸控冒泡，確保輸入框能被點擊
        const stopProp = (e) => e.stopPropagation();
        input.addEventListener('touchstart', stopProp);
        input.addEventListener('mousedown', stopProp);
        
        // 數值連動
        input.oninput = (e) => {
            r.conc = e.target.value === '' ? null : parseFloat(e.target.value);
        };
        
        // 刪除按鈕
        item.querySelector('button').onclick = (e) => {
            e.stopPropagation();
            state.regions = state.regions.filter(rg => rg.id !== r.id);
            refreshUI(); renderOverlay();
        };

        // 點擊項目選取
        item.onclick = () => {
            state.selectedId = r.id;
            renderOverlay();
            refreshUI();
        };

        dom.standardsList.appendChild(item);
    });

    const samp = state.regions.find(r => r.type === 'sample');
    dom.sampleBox.innerHTML = samp ? `<div class="flex items-center gap-3"><div class="w-8 h-8 rounded shadow-inner" style="background:rgb(${samp.avg.r},${samp.avg.g},${samp.avg.b})"></div><b class="text-emerald-600 text-sm">受測水樣：選取完成</b></div>` : '尚未選取水樣';
}

// --- 按鈕邏輯 ---
document.getElementById('modeStandard').onclick = () => { 
    state.mode='standard'; 
    document.getElementById('modeStandard').className='flex-1 py-3 bg-indigo-600 text-white rounded-xl shadow-lg font-bold scale-105 transition-all'; 
    document.getElementById('modeSample').className='flex-1 py-3 border-2 border-slate-200 bg-white text-slate-500 rounded-xl text-sm font-bold'; 
};
document.getElementById('modeSample').onclick = () => { 
    state.mode='sample'; 
    document.getElementById('modeSample').className='flex-1 py-3 bg-emerald-600 text-white rounded-xl shadow-lg font-bold scale-105 transition-all'; 
    document.getElementById('modeStandard').className='flex-1 py-3 border-2 border-slate-200 bg-white text-slate-500 rounded-xl text-sm font-bold'; 
};

document.getElementById('btnCancel').onclick = () => { 
    if(state.selectedId){ 
        state.regions = state.regions.filter(r => r.id !== state.selectedId); 
        state.selectedId = null; 
        refreshUI(); renderOverlay(); 
    } 
};

document.getElementById('btnAnalyze').onclick = () => {
    const stds = state.regions.filter(r => r.type === 'standard' && r.conc !== null).sort((a,b) => a.conc - b.conc);
    const samp = state.regions.find(r => r.type === 'sample');
    if (stds.length < 2 || !samp) return alert('分析失敗：請至少輸入 2 個標準濃度數值，並框選 1 個水樣區域。');

    const sL = rgbToLab(samp.avg.r, samp.avg.g, samp.avg.b);
    const sLs = stds.map(s => ({ c: s.conc, l: rgbToLab(s.avg.r, s.avg.g, s.avg.b) }));
    
    let res = -1;
    for (let i=0; i<sLs.length-1; i++) {
        const s1=sLs[i], s2=sLs[i+1];
        const d1=Math.sqrt(Math.pow(sL.L-s1.l.L,2)+Math.pow(sL.a-s1.l.a,2)+Math.pow(sL.b-s1.l.b,2));
        const d2=Math.sqrt(Math.pow(sL.L-s2.l.L,2)+Math.pow(sL.a-s2.l.a,2)+Math.pow(sL.b-s2.l.b,2));
        const d12=Math.sqrt(Math.pow(s1.l.L-s2.l.L,2)+Math.pow(s1.l.a-s2.l.a,2)+Math.pow(s1.l.b-s2.l.b,2));
        if (d1+d2 <= d12*1.2) { res = s1.c + (d1/(d1+d2))*(s2.c-s1.c); break; }
    }
    if (res===-1) res = sLs.map(s => ({c:s.c, d:Math.sqrt(Math.pow(sL.L-s.l.L,2)+Math.pow(sL.a-s.l.a,2)+Math.pow(sL.b-s.l.b,2))})).sort((a,b)=>a.d-b.d)[0].c;
    dom.result.innerText = res.toFixed(3);
};

document.getElementById('btnClearAll').onclick = () => { 
    if(confirm('確定清除所有選取資料？')){
        state.regions=[]; state.selectedId=null; refreshUI(); renderOverlay(); dom.result.innerText='--'; 
    }
};
</script>
</body>
</html>
