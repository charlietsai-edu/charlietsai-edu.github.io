<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>水質分析儀：觸控優化版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #f1f5f9; overflow-x: hidden; -webkit-user-select: none; }
    
    /* 照片視窗：固定為長方形比例 */
    .viewport-container { 
      aspect-ratio: 4 / 3; /* 強制長方形比例 */
      width: 100%;
      max-height: 55vh; 
      overflow: hidden; /* 由 JS 處理移動 */
      background-color: #1e293b;
      position: relative;
      border: 2px solid #334155;
      border-radius: 12px;
      touch-action: none;
    }

    #canvasContainer { 
      position: absolute;
      transform-origin: 0 0;
      cursor: grab;
    }

    /* 側邊欄捲動 */
    .sidebar-area { height: auto; max-height: 40vh; overflow-y: auto; }
    @media (min-width: 768px) {
        .flex-main { flex-direction: row; }
        .viewport-container { height: 65vh; aspect-ratio: auto; }
        .sidebar-area { max-height: 75vh; width: 380px; }
    }

    .std-input {
      font-size: 16px !important;
      border: 1px solid #cbd5e1;
      padding: 8px;
      border-radius: 8px;
      width: 100%;
    }
  </style>
</head>
<body class="p-2 md:p-4">
  <div class="max-w-7xl mx-auto flex flex-col gap-3">
    
    <header class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border">
        <h1 class="font-bold text-indigo-900 text-lg">水質數位分析儀</h1>
        <button id="btnClearAll" class="text-xs px-3 py-1 bg-slate-100 rounded-lg hover:bg-red-50">重設</button>
    </header>

    <div class="flex flex-col flex-main gap-4">
        <div class="flex-1 bg-white rounded-2xl shadow-lg p-3 border">
          <div id="viewport" class="viewport-container shadow-inner">
            <div id="canvasContainer">
              <canvas id="canvas"></canvas>
              <canvas id="overlay" class="absolute left-0 top-0 pointer-events-none"></canvas>
            </div>
          </div>
          
          <div class="mt-3 flex items-center justify-between px-2">
            <div class="flex gap-2">
              <button id="btnZoomIn" class="w-10 h-10 bg-slate-700 text-white rounded-xl font-bold">＋</button>
              <button id="btnZoomOut" class="w-10 h-10 bg-slate-700 text-white rounded-xl font-bold">－</button>
              <button id="btnZoomReset" class="px-4 py-2 bg-slate-200 text-slate-700 rounded-xl text-xs font-bold">重置視角</button>
            </div>
            <div class="text-[10px] text-slate-400 italic">模式：非畫框時可直接拖動照片</div>
          </div>
        </div>

        <aside class="sidebar-area bg-white rounded-2xl shadow-lg p-5 border">
          <div class="space-y-5">
            <div class="p-4 bg-indigo-50 rounded-xl border border-indigo-100">
              <label class="block text-xs font-bold text-indigo-900 mb-2 uppercase tracking-widest">1. 匯入照片</label>
              <input id="fileInput" type="file" accept="image/*" class="w-full text-xs" />
            </div>

            <div class="flex gap-2">
              <button id="modeStandard" class="flex-1 py-3 border-2 rounded-xl text-sm font-bold transition-all">選標準色</button>
              <button id="modeSample" class="flex-1 py-3 border-2 rounded-xl text-sm font-bold transition-all">選水樣</button>
            </div>

            <div id="standardsList" class="space-y-3">
                <p class="text-xs text-slate-300 text-center py-4">請框選色塊並輸入數值</p>
            </div>

            <div id="sampleBox" class="p-3 bg-slate-50 rounded-xl border text-center text-xs text-slate-400 italic">尚未選取水樣</div>

            <div class="pt-4 border-t">
              <button id="btnAnalyze" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg">計算濃度</button>
              <div id="result" class="mt-3 p-4 bg-slate-900 text-green-400 text-center font-mono text-3xl rounded-xl border-2 border-slate-700">--</div>
            </div>
            
            <button id="btnCancel" class="w-full py-2 text-rose-500 font-bold text-xs uppercase tracking-widest">刪除當前選取</button>
          </div>
        </aside>
    </div>
  </div>

<script>
let state = {
    img: new Image(),
    imgLoaded: false,
    mode: null, 
    regions: [], 
    current: null, 
    selectedId: null,
    viewScale: 1.0,
    posX: 0,
    posY: 0,
    isDraggingPhoto: false, // 是否正在拖動照片
    dragStart: { x: 0, y: 0 }
};

const dom = {
    fileInput: document.getElementById('fileInput'),
    canvas: document.getElementById('canvas'),
    overlay: document.getElementById('overlay'),
    ctx: document.getElementById('canvas').getContext('2d', { alpha: false }),
    octx: document.getElementById('overlay').getContext('2d'),
    container: document.getElementById('canvasContainer'),
    viewport: document.getElementById('viewport'),
    standardsList: document.getElementById('standardsList'),
    sampleBox: document.getElementById('sampleBox'),
    result: document.getElementById('result')
};

// --- 圖片載入 ---
dom.fileInput.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
        state.img = new Image();
        state.img.onload = function() {
            let tw = state.img.naturalWidth, th = state.img.naturalHeight;
            const MAX = 2200;
            if (tw > MAX || th > MAX) {
                const r = Math.min(MAX/tw, MAX/th);
                tw = Math.floor(tw*r); th = Math.floor(th*r);
            }
            dom.canvas.width = dom.overlay.width = tw;
            dom.canvas.height = dom.overlay.height = th;
            dom.ctx.fillStyle = "#FFFFFF";
            dom.ctx.fillRect(0,0,tw,th);
            dom.ctx.drawImage(state.img, 0, 0, tw, th);
            state.imgLoaded = true;
            state.regions = [];
            resetView();
            refreshUI();
            renderOverlay();
        };
        state.img.src = event.target.result;
    };
    reader.readAsDataURL(file);
};

// --- 視角控制 ---
function applyTransform() {
    dom.container.style.transform = `translate(${state.posX}px, ${state.posY}px) scale(${state.viewScale})`;
}

function resetView() {
    state.viewScale = 1.0;
    state.posX = 0;
    state.posY = 0;
    applyTransform();
}

document.getElementById('btnZoomIn').onclick = () => { state.viewScale *= 1.2; applyTransform(); };
document.getElementById('btnZoomOut').onclick = () => { state.viewScale /= 1.2; applyTransform(); };
document.getElementById('btnZoomReset').onclick = resetView;

// --- 座標轉換核心 ---
function getCanvasPos(e) {
    const rect = dom.viewport.getBoundingClientRect();
    const cx = (e.touches && e.touches.length) ? e.touches[0].clientX : e.clientX;
    const cy = (e.touches && e.touches.length) ? e.touches[0].clientY : e.clientY;
    
    // 扣除 Viewport 位置，並計算在當前 translate 與 scale 下的相對座標
    return {
        x: (cx - rect.left - state.posX) / state.viewScale,
        y: (cy - rect.top - state.posY) / state.viewScale
    };
}

function handleStart(e) {
    if (e.target.tagName === 'INPUT') return;
    if (!state.imgLoaded) return;

    const pos = getCanvasPos(e);
    
    // 1. 檢查是否點擊到現有色塊
    const hit = state.regions.find(r => pos.x >= r.x && pos.x <= r.x+r.w && pos.y >= r.y && pos.y <= r.y+r.h);
    if (hit) {
        state.selectedId = hit.id;
        refreshUI(); renderOverlay();
        return;
    }

    // 2. 判斷是「畫框模式」還是「拖動照片模式」
    if (state.mode) {
        state.current = { x0: pos.x, y0: pos.y, x: pos.x, y: pos.y };
    } else {
        state.isDraggingPhoto = true;
        const cx = (e.touches && e.touches.length) ? e.touches[0].clientX : e.clientX;
        const cy = (e.touches && e.touches.length) ? e.touches[0].clientY : e.clientY;
        state.dragStart = { x: cx - state.posX, y: cy - state.posY };
        dom.container.style.cursor = 'grabbing';
    }
}

function handleMove(e) {
    if (e.cancelable) e.preventDefault();
    const cx = (e.touches && e.touches.length) ? e.touches[0].clientX : e.clientX;
    const cy = (e.touches && e.touches.length) ? e.touches[0].clientY : e.clientY;

    if (state.current) {
        const pos = getCanvasPos(e);
        state.current.x = pos.x; state.current.y = pos.y;
        renderOverlay();
    } else if (state.isDraggingPhoto) {
        state.posX = cx - state.dragStart.x;
        state.posY = cy - state.dragStart.y;
        applyTransform();
    }
}

function handleEnd() {
    if (state.current) {
        const { x0, y0, x, y } = state.current;
        const r = { id: Date.now(), x: Math.min(x0,x), y: Math.min(y0,y), w: Math.abs(x-x0), h: Math.abs(y-y0), type: state.mode, conc: null };
        if (r.w > 5) {
            if (r.type === 'sample') state.regions = state.regions.filter(i => i.type !== 'sample');
            r.avg = getAvgColor(r);
            state.regions.push(r);
            state.selectedId = r.id;
        }
    }
    state.current = null;
    state.isDraggingPhoto = false;
    dom.container.style.cursor = 'grab';
    refreshUI(); renderOverlay();
}

dom.viewport.addEventListener('touchstart', handleStart, {passive: false});
window.addEventListener('touchmove', handleMove, {passive: false});
window.addEventListener('touchend', handleEnd);
dom.viewport.addEventListener('mousedown', handleStart);
window.addEventListener('mousemove', handleMove);
window.addEventListener('mouseup', handleEnd);

function getAvgColor(r) {
    const d = dom.ctx.getImageData(r.x, r.y, r.w, r.h).data;
    let rs=0, gs=0, bs=0, c=0;
    for (let i=0; i<d.length; i+=4) { rs+=d[i]; gs+=d[i+1]; bs+=d[i+2]; c++; }
    return { r: rs/c, g: gs/c, b: bs/c };
}

function rgbToLab(r,g,b){
    let [R,G,B] = [r/255,g/255,b/255].map(v => v > 0.04045 ? Math.pow((v+0.055)/1.055, 2.
